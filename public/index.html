<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkboxes</title>
    <link rel="stylesheet" href="style.css">    
</head>
<body>
    <h1>Checkboxes</h1>
    <p>A tiny playground of clickable squares. Tick away.</p>
    <div id="container"> </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
       const socket = io(); 
       const box = document.getElementById("container");
       const CHECKBOX_COUNT = 100;
       
       socket.on("server:checkbox:change", (data) =>{
         console.log("Socket Server event", data);
         const {index, checked} = data;

         const input = document.getElementById(`checkbox-${index}`);
         if(input){
            input.checked = checked;
         }
         
        });

         new Array(CHECKBOX_COUNT).fill(null).forEach((_, index)=>{
             const input= document.createElement("input");
             input.type = "checkbox";
             input.id = `checkbox-${index}`;

             input.addEventListener("change", (event)=>{
               const checked = event.target.checked;
               console.log("Checkbox changed",{index,checked});
               socket.emit("client:checkbox:change",{index,checked});
             })
             box.appendChild(input);
       });
       
    </script>
    
</body>
</html>
